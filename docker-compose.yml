services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.staging
      target: laravel-app
    image: uco-tracer-erp:latest
    ports:
      - "8000:80"
    env_file:
      - docker/.env.staging
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "php", "artisan", "--version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - app_network

  ocr:
    build:
      context: .
      dockerfile: Dockerfile.ocr
    image: uco-tracer-ocr:latest
    ports:
      - "5000:5000"
    environment:
      FLAGS_use_mkldnn: "0"
      PADDLE_PDX_DISABLE_MODEL_SOURCE_CHECK: "True"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - app_network

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: srapp_uco_tracer
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - app_network

volumes:
  mysql_data:

networks:
  app_network:
    driver: bridge
